# Mago Configuration - Waffle Commons (Auth, Beta 0)
# For full documentation, see https://mago.carthage.software/tools/overview
php-version = "8.5.5"

[source]
paths = ["src/", "tests/"]
includes = ["vendor"]
excludes = []

# -----------------------------------------------------------------------------
# Mago Guard — Beta 0 standardized architectural perimeter
# -----------------------------------------------------------------------------
# By default a new component depends only on `waffle-commons/contracts`. Edit
# the `permit` list below if your component legitimately requires another
# waffle-commons package (and declare the dependency in composer.json).
[guard]
mode = "default"
excludes = ["tests/bootstrap.php"]

[guard.perimeter]
layering = ["Waffle", "WaffleTests"]

[guard.perimeter.layers]
core = ["@global", "Psl\\**"]
psr = ["Psr\\**"]

[[guard.perimeter.rules]]
namespace = "Waffle\\Commons\\Auth"
permit = [
    "Waffle\\Commons\\Auth\\**",
    "Waffle\\Commons\\Contracts\\**",
    # Worker-safety audit tooling (igor-php 0.7+): dev-only #[WorkerSafe] metadata, inert at runtime.
    "IgorPhp\\IgorBundle\\Attribute\\**",
    "@layer:core",
    "@layer:psr",
]

[[guard.perimeter.rules]]
namespace = "WaffleTests\\Commons\\Auth"
permit = ["@all"]

[[guard.structural.rules]]
on = "Waffle\\Commons\\**"
target = "interface"
must-be-named = "*Interface"
reason = "Interfaces must follow the waffle-commons *Interface convention."

[[guard.structural.rules]]
on = "Waffle\\Commons\\**\\Enum\\**"
must-be = ["enum"]
reason = "Reserved namespace: only enum declarations are permitted here."

[[guard.structural.rules]]
on = "Waffle\\Commons\\**\\Exception\\**"
target = "class"
must-be-named = "*Exception"
reason = "Exception classes must follow the *Exception naming convention."

[formatter]
print-width = 120
tab-width = 4
use-tabs = false
single-quote = true
trailing-comma = true
end-of-line = "lf"

[linter]
# Zero-Baseline policy (Beta 0): no `baseline = ...` is permitted.
integrations = ["phpunit"]

[linter.rules]
# Security - Zero tolerance
no-insecure-comparison = { level = "error" }
no-literal-password = { level = "error" }
no-debug-symbols = { level = "error" }
disallowed-functions = { level = "error", functions = ["eval", "exec", "system", "shell_exec", "passthru", "phpinfo"] }

# Code quality - Strict
prefer-interface = { level = "error" }
strict-types = { level = "error" }
# NOTE: the template's `property-type` / `return-type` linter rules were removed:
# they are not recognised by the pinned mago 1.29.0 (they break config parsing)
# and are already enforced natively by the strict `[analyzer]` block below.

# -----------------------------------------------------------------------------
# Opinionated style / software-metric rules disabled project-wide. This mirrors
# the curated set every shipped Waffle component already uses (see security &
# data): these are stylistic or metric heuristics, not correctness checks —
# correctness is enforced by the strict `[analyzer]` block below.
# `excessive-parameter-list` is disabled because the RFC-021 wire value objects
# (UserAssertion: 7 claims, TokenSet: RFC 6749 §5.1 members) mirror fixed
# protocol shapes — splitting them would invent artificial structure.
# -----------------------------------------------------------------------------
assertion-style = { enabled = false }
assert-description = { enabled = false }
literal-named-argument = { enabled = false }
no-boolean-flag-parameter = { enabled = false }
too-many-methods = { enabled = false }
cyclomatic-complexity = { enabled = false }
excessive-parameter-list = { enabled = false }
single-class-per-file = { enabled = false }
prefer-arrow-function = { enabled = false }
no-redundant-nullsafe = { enabled = false }

[analyzer]
# Zero-Baseline policy (Beta 0): no `baseline = ...` is permitted.
find-unused-definitions = true
find-unused-expressions = true
analyze-dead-code = true
check-throws = true
strict-list-index-checks = true
strict-array-index-existence = true
ignore = [
    # `check-throws` is a production-code discipline. In test methods, PHPUnit's
    # own assertion exceptions and the domain exceptions a test deliberately
    # lets bubble to PHPUnit would otherwise force a `@throws` tag on every
    # single test — noise, not safety. Scoped to tests/ (same as data & security).
    { code = "unhandled-thrown-type", in = ["tests/"] },
    # These files are the component's untyped wire boundary — `json_decode()`d
    # token/assertion/discovery payloads, PSR-7 server params, and PSR-16
    # cache reads are `mixed` by signature (RFC-021 §4.3/§4.4/§4.5). Every
    # value is narrowed by an `is_*()` guard before any use, and a shape
    # violation throws the scheme's 401/403 domain exception (fail-closed),
    # so the `mixed` never escapes these files.
    { code = "mixed-assignment", in = [
        "src/Authenticator/AssertionAuthenticator.php",
        "src/Credential/ClientCredentialsProvider.php",
        "src/Identity/ClaimMapping.php",
        "src/Identity/UserIdentity.php",
        "src/Jwt/JwtParser.php",
        "src/Jwt/JwtValidator.php",
        "src/Jwt/Key/JwksKeyResolver.php",
        "src/Oauth/OauthClient.php",
        "src/Oauth/OidcDiscovery.php",
        "src/Oauth/TokenSet.php",
        "src/Oauth/Transaction/OauthTransactionCodec.php",
        "src/Uab/AuthBridgeVerifier.php",
        "src/Uab/UserAssertion.php",
        # Test-side PSR boundaries: PSR-7 getAttribute(), PSR-16 iterables, and
        # openssl key details are `mixed` by signature; every read is narrowed
        # by an `is_*()` guard or an immediate assertion.
        "tests/src/Middleware/AuthenticationMiddlewareTest.php",
        "tests/src/Helper/FakeCache.php",
        "tests/src/Helper/JwtMinter.php",
    ] },
]
